<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DB Editor Icon Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
      background: #0C0A1A;
      color: #E2E8F0;
      min-height: 100vh;
    }
    h1 {
      font-size: 36px;
      font-weight: 300;
      letter-spacing: 4px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #FBBF24, #F97316, #EA580C, #DC2626, #8B5CF6, #3B82F6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle { color: #64748B; margin-bottom: 50px; font-size: 14px; letter-spacing: 2px; }
    .preview {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 60px;
    }
    .icon-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .icon-box img {
      border-radius: 22%;
      box-shadow: 0 8px 40px rgba(245,158,11,0.15), 0 0 80px rgba(245,158,11,0.05);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .icon-box img:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 50px rgba(245,158,11,0.25), 0 0 100px rgba(245,158,11,0.1);
    }
    .size-label { font-size: 13px; color: #64748B; font-family: monospace; }
    .section { margin-top: 40px; text-align: center; max-width: 600px; }
    .section h2 { font-size: 20px; font-weight: 400; margin-bottom: 16px; color: #94A3B8; }
    .section p { color: #64748B; line-height: 1.8; font-size: 14px; }
    .section code {
      background: #1E1B4B;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 13px;
      color: #FBBF24;
    }
    .tip {
      margin-top: 30px;
      padding: 16px 24px;
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 12px;
      color: #FBBF24;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h1>DB EDITOR</h1>
  <p class="subtitle">APP ICON PREVIEW</p>

  <div class="preview">
    <div class="icon-box">
      <img src="icon.svg" width="256" height="256" alt="256">
      <span class="size-label">256 x 256</span>
    </div>
    <div class="icon-box">
      <img src="icon.svg" width="128" height="128" alt="128">
      <span class="size-label">128 x 128</span>
    </div>
    <div class="icon-box">
      <img src="icon.svg" width="64" height="64" alt="64">
      <span class="size-label">64 x 64</span>
    </div>
    <div class="icon-box">
      <img src="icon.svg" width="32" height="32" alt="32">
      <span class="size-label">32 x 32</span>
    </div>
  </div>

  <div class="tip">
    使用 <code>npx tauri icon public/icon-1024.svg</code> 自动生成全套 Tauri 图标
  </div>

  <div class="section">
    <h2>设计说明</h2>
    <p>
      橙黄暖光核心 + 热气上升光晕 + 蓝紫科技电路<br>
      外圈渐变环：橙 → 红 → 紫 → 蓝<br>
      圆周装饰光点：暖冷色交替
    </p>
  </div>
</body>
</html>
